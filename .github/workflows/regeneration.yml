name: DNA Regeneration System

on:
  schedule:
    - cron: '0 * * * *'  # Setiap jam
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.PAT_TOKEN }}
    
    - name: Check Critical Files
      run: |
        python -c "
        import os
        import json
        
        critical_files = {
            'DNA/core_rules.json': {'max_risk': 0.02, 'evolution_lock': True},
            'DNA/risk_management.json': {'max_drawdown': 0.05, 'session_lock': True},
            'BRAIN/SEED/seed_001.json': {'genesis': True}
        }
        
        for file_path, default_content in critical_files.items():
            if not os.path.exists(file_path):
                os.makedirs(os.path.dirname(file_path), exist_ok=True)
                with open(file_path, 'w') as f:
                    json.dump(default_content, f, indent=2)
                print(f'Regenerated: {file_path}')
            else:
                print(f'OK: {file_path}')
        "
    
    - name: Restore from Backup if Corrupted
      run: python SECURITY/immunity.py --restore-if-needed
    
    - name: Commit Restorations
      run: |
        git config user.name "SEA-TO Immunity"
        git config user.email "immunity@sea-to.ai"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "🛡️ Regeneration check passed" && git push)

