name: SEA-TO Evolution Engine

on:
  schedule:
    - cron: '0 */4 * * *'  # Setiap 4 jam
  workflow_dispatch:  # Manual trigger

jobs:
  evolve:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.PAT_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install numpy pandas scikit-learn requests beautifulsoup4
    
    - name: Run Immunity Check
      run: python SECURITY/immunity.py --check-only
    
    - name: Evolution Process
      run: |
        python EVOLUTION/evolve.py --generation auto
        python EVOLUTION/tournament.py --select-top 10
    
    - name: Update Dashboard Data
      run: python DASHBOARD/update_data.py
    
    - name: Commit Evolution Results
      run: |
        git config user.name "SEA-TO Bot"
        git config user.email "evolution@sea-to.ai"
        git add BRAIN/ACTIVE/ DASHBOARD/data/ EVOLUTION/logs/
        git commit -m "🧬 Evolution cycle $(date +%Y%m%d-%H%M)
        
        - Mutations applied
        - Tournament completed
        - Top performers selected
        - Dashboard updated" || echo "No changes"
        git push
